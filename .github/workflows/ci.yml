name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run tests (mock server)
        run: |
          # Start API server in background with test env
          GROQ_API_KEY=test STRIPE_SECRET_KEY=test node index.js &
          sleep 3
          npm test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STRIPE_SECRET_KEY: test
